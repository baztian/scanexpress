[global]
default_user = e2e
paperless_base_url = http://127.0.0.1:18089
scan_timeout_seconds = 30
paperless_timeout_seconds = 5

[user:e2e]
paperless_api_token = test-token
default_device = fake

[user:e2e:device:fake]
scan_command = .venv/bin/python scripts/fake_scan_wrapper.py
device_id = fake-device
scan_output_mode = batch
scan_timeout_seconds = 30

[user:e2e:device:fake:scanimage-params]
source = Automatic Document Feeder

[user:e2e:device:flatbed]
scan_command = .venv/bin/python scripts/fake_scan_wrapper.py
device_id = flatbed-device
scan_output_mode = single_file
scan_timeout_seconds = 45

[user:e2e:device:flatbed:scanimage-params]
source = Flatbed
