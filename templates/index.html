<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScanExpress</title>
  </head>
  <body>
    <main>
      <h1>ScanExpress</h1>
      <p>Simple Flask scaffold is ready.</p>
      <label for="deviceSelect">Device configuration</label>
      <select id="deviceSelect" name="deviceSelect"></select>
      <p id="deviceConfigText">Configured device details:</p>
      <pre id="deviceDetails">No device selected.</pre>
      <button id="scanButton" type="button">Start Scan</button>
      <p id="statusText">Status: idle</p>
      <small id="statusStats" style="display: block; font-size: 0.85em; line-height: 1.4; white-space: pre-line;"></small>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
