<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScanExpress</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main id="appShell" class="app-shell">
      <header class="app-header">
        <div class="app-header-main">
          <h1>ScanExpress</h1>
          <p class="subtitle">Scan locally and send documents to Paperless-ngx.</p>
        </div>
        <div class="app-header-account" aria-label="User account">
          <div class="account-menu">
            <button
              id="accountMenuButton"
              type="button"
              class="account-menu-button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="accountMenuList"
            >
              <span id="headerUsername" class="header-username">{{ resolved_username or 'Unknown user' }}</span>
              <span class="account-menu-chevron" aria-hidden="true">▾</span>
            </button>
            <div id="accountMenuList" class="account-menu-list" role="menu" hidden>
              <button id="logoutButton" type="button" class="account-menu-item" role="menuitem">Log out</button>
            </div>
          </div>
        </div>
      </header>

      <section class="panel action-panel">
        <div class="filename-control">
          <label for="filenameInput">Filename</label>
          <input id="filenameInput" name="filename" type="text" autocomplete="off" />
        </div>
        <button id="scanButton" type="button">Start Scan</button>
        <div class="status-wrap">
          <p id="statusText">Status: idle</p>
          <small id="statusStats"></small>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">Scan configuration</h2>
        <fieldset id="deviceConfigFieldset" class="device-fieldset">
          <legend>Device configuration</legend>
          <div id="deviceRadioGroups" class="device-radio-groups"></div>
        </fieldset>
        <details id="deviceDetailsPanel" class="device-details-panel">
          <summary id="deviceDetailsSummary" class="muted-label">Show details</summary>
          <pre id="deviceDetails">No device selected.</pre>
        </details>
      </section>

      <section class="panel">
        <h2 class="panel-title">Recent uploads</h2>
        <div class="table-wrap">
          <table class="recent-table" aria-label="Recent scans">
            <thead>
              <tr>
                <th scope="col">Submitted</th>
                <th scope="col">Device/config</th>
                <th scope="col">File name</th>
                <th scope="col">Task ID</th>
                <th scope="col">Status</th>
                <th scope="col">Result</th>
                <th scope="col">Document</th>
              </tr>
            </thead>
            <tbody id="recentUploadsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
