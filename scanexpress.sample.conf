# ScanExpress Configuration Sample
#
# Copy this file to ~/.config/scanexpress/scanexpress.conf or /etc/scanexpress.conf
# and customize for your setup.
# Each user gets a [user:username] section.
# Each user can have multiple device templates under [user:username:device:name].
#
# Optional environment variable:
# - SCANEXPRESS_CONFIG_FILE: Override config file path

[global]
# Flask session signing secret. Keep this value private.
# Optional when SCANEXPRESS_SECRET_KEY env var is set.
# Set this to a long random value before deployment.
# secret_key = replace-with-long-random-secret
default_user = alice
paperless_base_url = https://paperless.example.com
scan_timeout_seconds = 30
paperless_timeout_seconds = 5

[user:alice]
password_hash = replace-with-werkzeug-hash-for-alice
paperless_api_token = replace-with-alice-token-abc123
# Optional explicit defaults to avoid relying on alphabetical fallback.
default_device = brother-color
# Optional: use a different device template for scanimage params only.
# This is useful when one template holds scanner mode presets while another
# template provides the physical device_id and command.
default_scanimage_params_device = brother-bw

[user:alice:device:brother-color]
# Device ID using udev symlink (stable across unplug/replug; see CONFIG_SPEC.md for setup).
# Note: `...:libusb:/dev/<symlink>` is ScanExpress-specific convenience syntax,
# not a native scanimage device specifier.
# Alternative (not recommended): numeric USB address like BrotherADS2200:libusb:001:002
device_id = BrotherADS2200:libusb:/dev/brother-scanner
scan_command = /opt/scanexpress/scripts/scan_wrapper.sh
scan_output_mode = batch
scan_timeout_seconds = 30

[user:alice:device:brother-color:scanimage-params]
resolution = 300
mode = 24 bit Color

[user:alice:device:brother-bw]
# Using same scanner as brother-color but with different scan params (B&W mode).
# See [user:alice:device:brother-color] for udev setup guidance.
device_id = BrotherADS2200:libusb:/dev/brother-scanner
scan_command = /opt/scanexpress/scripts/scan_wrapper.sh
scan_output_mode = batch
scan_timeout_seconds = 30

[user:alice:device:brother-bw:scanimage-params]
resolution = 200
mode = Black & White

[user:bob]
password_hash = replace-with-werkzeug-hash-for-bob
paperless_api_token = replace-with-bob-token-xyz789
default_device = canon-default

[user:bob:device:canon-default]
device_id = Canon:usb:123:456
scan_command = /usr/bin/scanimage
scan_output_mode = single_file
scan_timeout_seconds = 40

[user:bob:device:canon-default:scanimage-params]
resolution = 150
mode = 24 bit Color
